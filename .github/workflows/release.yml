name: Build And Release Demo Analiz

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas demoparser2 pillow pyinstaller polars

      - name: Build exe
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DemoAnaliz --hidden-import polars --collect-all polars Test.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DemoAnaliz.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
